<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Preview</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"></script>
    <style>
      html, body, #root { height: 100%; margin: 0; background: #fff; color: #111; font-family: ui-sans-serif, system-ui, sans-serif; }
      .__err { padding: 16px; background: #fee2e2; color: #991b1b; font-family: ui-monospace, monospace; white-space: pre-wrap; font-size: 12px; }
    </style>
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.3.1",
          "react-dom": "https://esm.sh/react-dom@18.3.1",
          "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
          "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
          "react-router-dom": "https://esm.sh/react-router-dom@6.26.2?deps=react@18.3.1,react-dom@18.3.1",
          "lucide-react": "https://esm.sh/lucide-react@0.462.0?deps=react@18.3.1",
          "clsx": "https://esm.sh/clsx@2.1.1",
          "tailwind-merge": "https://esm.sh/tailwind-merge@2.5.4"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      let currentFiles = {};
      function showError(msg) {
        const root = document.getElementById('root');
        root.innerHTML = '';
        const pre = document.createElement('pre');
        pre.className = '__err';
        pre.textContent = String(msg);
        root.appendChild(pre);
      }
      window.addEventListener('error', (e) => showError(e.message + '\n' + (e.error?.stack || '')));
      window.addEventListener('unhandledrejection', (e) => showError('Unhandled: ' + (e.reason?.message || e.reason)));

      function transform(code, filename) {
        try {
          return window.Babel.transform(code, {
            filename,
            presets: [['react', { runtime: 'automatic' }], 'typescript'],
            plugins: [],
          }).code;
        } catch (e) {
          throw new Error('Transform error in ' + filename + ': ' + e.message);
        }
      }

      function rewriteImports(code, currentPath) {
        // rewrite relative imports / @/ aliases to blob URLs handled at module level.
        // Replace `@/` with `/src/`, leave bare imports for importmap.
        return code.replace(/(["'])@\//g, '$1/src/');
      }

      function buildModuleGraph(files) {
        // Convert each .ts/.tsx/.js/.jsx file to a blob URL with rewritten imports.
        const urls = {};
        const order = Object.keys(files).filter((p) => /\.(t|j)sx?$/.test(p));

        // First pass: transform and create placeholder blob urls.
        const transformed = {};
        for (const path of order) {
          let code = files[path];
          code = rewriteImports(code, path);
          transformed[path] = transform(code, path);
        }

        // Second pass: replace import specifiers pointing at our files with blob URLs.
        // We need resolution: e.g. import './foo' from '/src/App.tsx' -> '/src/foo.tsx'
        function resolve(spec, fromPath) {
          if (!spec.startsWith('.') && !spec.startsWith('/')) return null;
          const baseDir = fromPath.substring(0, fromPath.lastIndexOf('/'));
          let target = spec.startsWith('/') ? spec : baseDir + '/' + spec;
          // normalize
          const parts = [];
          for (const seg of target.split('/')) {
            if (seg === '' || seg === '.') continue;
            if (seg === '..') parts.pop();
            else parts.push(seg);
          }
          target = '/' + parts.join('/');
          const candidates = [target, target + '.tsx', target + '.ts', target + '.jsx', target + '.js', target + '/index.tsx', target + '/index.ts'];
          for (const c of candidates) if (transformed[c]) return c;
          return null;
        }

        // Create blob urls iteratively, rewriting specifiers as we go.
        // To support cycles, first create empty placeholders, then fill.
        for (const path of order) urls[path] = null;

        // We need URLs before rewriting; create them with dummy then revoke+recreate.
        // Simpler: do a topological-ish pass by rewriting using a token, then sub urls.
        const tokens = {};
        let i = 0;
        for (const p of order) tokens[p] = `__BLOB_${i++}__`;

        const finalCode = {};
        for (const path of order) {
          let code = transformed[path];
          code = code.replace(/((?:import|export)[^'"]*?from\s*|import\s*\(\s*)(["'])([^"']+)\2/g, (m, pre, q, spec) => {
            const resolved = resolve(spec, path);
            if (resolved) return pre + q + tokens[resolved] + q;
            return m;
          });
          // bare side-effect imports
          code = code.replace(/import\s*(["'])([^"']+)\1/g, (m, q, spec) => {
            const resolved = resolve(spec, path);
            if (resolved) return 'import ' + q + tokens[resolved] + q;
            return m;
          });
          finalCode[path] = code;
        }

        // Now create blob URLs and substitute tokens.
        // Strategy: serialize each module as a blob, doing token substitution after all URLs known.
        const blobs = {};
        for (const path of order) blobs[path] = URL.createObjectURL(new Blob([''], { type: 'text/javascript' }));

        for (const path of order) {
          let code = finalCode[path];
          for (const p of order) code = code.split(tokens[p]).join(blobs[p]);
          // replace the placeholder blob content by creating a fresh blob and updating mapping? Blobs are immutable; we instead make new blob and remap.
          blobs[path] = URL.createObjectURL(new Blob([code], { type: 'text/javascript' }));
        }

        // Second-round substitution needed because earlier blobs referenced old URLs.
        // Redo with new urls now known.
        for (const path of order) {
          let code = finalCode[path];
          for (const p of order) code = code.split(tokens[p]).join(blobs[p]);
          blobs[path] = URL.createObjectURL(new Blob([code], { type: 'text/javascript' }));
        }

        return { blobs, entry: blobs['/src/main.tsx'] || blobs['/src/App.tsx'] };
      }

      async function mount(files) {
        try {
          // Normalize paths (ensure leading /)
          const norm = {};
          for (const k in files) {
            const key = k.startsWith('/') ? k : '/' + k;
            norm[key] = files[k];
          }
          if (!norm['/src/App.tsx'] && !norm['/src/main.tsx']) {
            showError('No /src/App.tsx or /src/main.tsx in generated files.');
            return;
          }
          // Ensure a main.tsx exists that mounts App.
          if (!norm['/src/main.tsx']) {
            norm['/src/main.tsx'] = `import { createRoot } from 'react-dom/client';
import App from './App';
createRoot(document.getElementById('root')).render(<App />);`;
          }
          const { entry } = buildModuleGraph(norm);
          document.getElementById('root').innerHTML = '';
          const s = document.createElement('script');
          s.type = 'module';
          s.src = entry;
          s.onerror = (e) => showError('Entry load failed');
          document.body.appendChild(s);
        } catch (e) {
          showError(e.message + '\n' + (e.stack || ''));
        }
      }

      window.addEventListener('message', (ev) => {
        const data = ev.data;
        if (data?.type === 'files') {
          currentFiles = data.files;
          mount(currentFiles);
        }
      });
      window.parent?.postMessage({ type: 'preview-ready' }, '*');
    </script>
  </body>
</html>
